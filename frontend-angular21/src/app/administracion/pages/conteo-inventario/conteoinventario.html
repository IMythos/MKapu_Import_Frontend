<div class="conteo-page">

    <p-card class="conteo-header-card">
      <div class="flex align-items-center justify-content-between flex-wrap gap-3">
  
        <div class="flex align-items-center gap-3">
          <span class="sedes-title-icon">
            <i class="pi pi-chart-line"></i>
          </span>
          <div>
            <p class="sedes-kicker">
              ADMINISTRACIÓN · CONTEOS
            </p>
            <h2 class="sedes-title">
              CONTEOS DE INVENTARIO
            </h2>
          </div>
        </div>
  
        <p-button
          label="Crear Nuevo Conteo"
          icon="pi pi-plus"
          (onClick)="crearConteo()">
        </p-button>
  
      </div>
    </p-card>
  
    <p-card class="mt-3 filtros-card">
  
      <div class="flex flex-wrap gap-3 align-items-center">
  
        <p-datepicker
          [ngModel]="fechaSeleccionada()"
          (ngModelChange)="fechaSeleccionada.set($event)"
          dateFormat="dd/mm/yy"
          placeholder="dd/mm/yyyy"
          [showIcon]="true">
        </p-datepicker>
  
        <span class="p-input-icon-left flex-1">
          <i class="pi pi-search"></i>
          <input
            pInputText
            type="text"
            placeholder="Buscar por detalle..."
            [ngModel]="filtroBusqueda()"
            (ngModelChange)="filtroBusqueda.set($event)" />
        </span>
  
        <p-autoComplete
          [ngModel]="estadoSeleccionado()"
          (ngModelChange)="estadoSeleccionado.set($event)"
          [suggestions]="estadosFiltrados()"
          (completeMethod)="filtrarEstados($event)"
          optionLabel="nombre"
          placeholder="Estado"
          [dropdown]="true">
        </p-autoComplete>

        <p-autoComplete
          [ngModel]="familiaSeleccionada()"
          (ngModelChange)="familiaSeleccionada.set($event)"
          [suggestions]="familiasFiltradas()"
          (completeMethod)="filtrarFamilias($event)"
          optionLabel="nombre"
          placeholder="Familia"
          [dropdown]="true">
        </p-autoComplete>
      </div>
    </p-card>  
    <p-card class="mt-3 tabla-card">

      <p-table
        [value]="conteosFiltrados()"
        [loading]="loading()"
        responsiveLayout="scroll">
  
        <ng-template pTemplate="header">
          <tr>
            <th>Fecha</th>
            <th>Detalle</th>
            <th>Estado</th>
            <th>Familia</th>
            <th>Acción</th>
          </tr>
        </ng-template>
  
        <ng-template pTemplate="body" let-row>
          <tr>
            <td>{{ row.fechaIni | date:'dd/MM/yyyy HH:mm' }}</td>
            
            <td>
              <div class="flex flex-column">
                <span class="font-semibold text-700">
                  Conteo en {{ row.nomSede }}
                </span>
                <small class="text-500">
                  {{ row.totalItems }} ítems
                  <ng-container *ngIf="row.detalles && row.detalles.length > 0">
                    ({{ row.detalles[0].descripcion }} 
                     <span *ngIf="row.detalles.length > 1">y otros...</span>)
                  </ng-container>
                </small>
              </div>
            </td>

            <td>
              <p-tag
                [value]="row.estado"
                [severity]="
                  row.estado === 'AJUSTADO' || row.estado === 'FINALIZADO' ? 'success' :
                  row.estado === 'ANULADO' ? 'danger' :
                  'warn'
                ">
              </p-tag>
            </td>

            <td>
               <p-tag value="Varias Familias" severity="info" [rounded]="true" styleClass="p-tag-sm"></p-tag>
            </td>

            <td>
              <button
                pButton
                type="button"
                label="Ver detalle"
                class="p-button-text font-bold"
                styleClass="sedes-pill"
                (click)="verDetalle(row)">
              </button>
            </td>
          </tr>
        </ng-template>

      </p-table>
  
    </p-card>
  
  </div>
