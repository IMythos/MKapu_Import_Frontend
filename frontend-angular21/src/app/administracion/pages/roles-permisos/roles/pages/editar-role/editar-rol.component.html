<div class="p-2">
  <p-card styleClass="sedes-header-card mb-4 ventas-header-bordered">
    <div class="flex align-items-center justify-content-between flex-wrap gap-2">
      <div class="flex align-items-center gap-3">
        <span class="sedes-title-icon"><i class="pi pi-pencil"></i></span>
        <div>
          <p class="sedes-kicker">ADMINISTRADOR - ROLES</p>
          <h2 class="sedes-title">EDITAR ROL</h2>
        </div>
      </div>
      <p-button label="Volver" icon="pi pi-arrow-left"
        severity="secondary" [outlined]="true"
        styleClass="sedes-pill" (onClick)="cancelar()">
      </p-button>
    </div>
  </p-card>

  <p-card>
    @if (svc.loading()) {
      <div class="flex align-items-center gap-2 text-500 py-3">
        <i class="pi pi-spin pi-spinner"></i> Cargando rol...
      </div>
    }

    @if (!svc.loading()) {
      <form [formGroup]="form" class="formgrid grid">

        <div class="field col-12 md:col-6">
          <label class="font-medium mb-2 block">
            Nombre <span class="text-red-400">*</span>
          </label>
          <input pInputText formControlName="nombre" class="w-full"
                 placeholder="Ej: Administrador"
                 [ngClass]="{ 'ng-invalid ng-dirty': isInvalid('nombre') }">
          @if (isInvalid('nombre')) {
            <small class="text-red-400 block mt-1">
              <i class="pi pi-exclamation-circle mr-1"></i>
              Nombre requerido (máx. 45 caracteres).
            </small>
          }
        </div>

        <div class="field col-12 md:col-6">
          <label class="font-medium mb-2 block">Descripción</label>
          <input pInputText formControlName="descripcion" class="w-full"
                 placeholder="Descripción opcional del rol">
        </div>

        <div class="field col-12 flex align-items-center gap-2 mt-1">
          <p-checkbox formControlName="activo" [binary]="true" inputId="activo"></p-checkbox>
          <label for="activo" class="font-medium cursor-pointer">Activo</label>
        </div>

        <div class="col-12 flex gap-2 justify-content-end pt-3">
          <p-button label="Cancelar" icon="pi pi-times"
            severity="secondary" [outlined]="true"
            styleClass="sedes-pill" (onClick)="cancelar()">
          </p-button>
          <p-button label="Guardar Cambios" icon="pi pi-check"
            [loading]="submitting()"
            [disabled]="form.invalid || submitting()"
            styleClass="sedes-pill"
            (onClick)="guardar()">
          </p-button>
        </div>

      </form>
    }
  </p-card>
</div>
<p-toast position="top-right"></p-toast>
