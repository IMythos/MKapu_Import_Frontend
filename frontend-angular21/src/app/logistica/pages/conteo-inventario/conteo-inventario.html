<div class="p-2">
  <p-card styleClass="productos-header-card mb-4 productos-header-bordered">
    <div class="flex align-items-center justify-content-between flex-wrap gap-2">
      <div class="flex align-items-center gap-3">
        <span class="productos-title-icon">
          <i class="pi pi-history"></i>
        </span>
        <div>
          <p class="productos-kicker mb-0">ALMACÉN</p>
          <h2 class="productos-title mb-0">Historial de Conteos</h2>
        </div>
      </div>
      <div class="flex gap-2">
        <p-button
          label="Nuevo Conteo"
          icon="pi pi-plus"
          styleClass="productos-pill"
          (onClick)="irACrearConteo()"
        ></p-button>
      </div>
    </div>
  </p-card>

  <div class="surface-card border-round-xl shadow-1 overflow-hidden">
    <p-table [value]="historialConteos()" [loading]="loading()" [rowHover]="true" styleClass="productos-table-nativa">
      <ng-template pTemplate="header">
        <tr>
          <th>ID Conteo</th>
          <th>Fecha Inicio</th>
          <th>Sede</th>
          <th class="text-center">Total Items</th>
          <th class="text-center">Diferencias</th>
          <th class="text-center">Estado</th>
          <th style="width: 5%">Acciones</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-conteo>
        <tr>
          <td class="font-bold">#{{ conteo.idConteo | number:'3.0' }}</td>
          <td>{{ conteo.fechaInicio | date:'dd/MM/yyyy HH:mm' }}</td>
          <td>{{ conteo.sede }}</td>
          <td class="text-center font-semibold">{{ conteo.totalItems }}</td>
          <td class="text-center">
            <span [ngClass]="{'text-red-500 font-bold': conteo.totalDiferencias !== 0, 'text-green-500': conteo.totalDiferencias === 0}">
              {{ conteo.totalDiferencias }}
            </span>
          </td>
          <td class="text-center">
            <p-tag [value]="conteo.estado" [severity]="getEstadoSeverity(conteo.estado)" [rounded]="true"></p-tag>
          </td>
          <td>
            <p-button icon="pi pi-eye" text severity="secondary" pTooltip="Ver Detalle" (onClick)="verDetalleConteo(conteo)"></p-button>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="7" class="text-center py-6 text-500">No hay conteos registrados.</td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
