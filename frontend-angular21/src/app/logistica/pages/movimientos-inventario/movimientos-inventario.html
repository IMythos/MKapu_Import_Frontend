<div class="p-2">
      <p-card class="productos-header-card mb-4 productos-header-bordered">
      <div class="flex align-items-center justify-content-between flex-wrap gap-2">
        <div class="flex align-items-center gap-3">
          <span class="productos-title-icon">
            <i class="pi pi-sliders-h"></i>
          </span>
          <div>
            <p class="productos-kicker mb-0">ALMACÉN ·  MOVIMIENTO INVENTARIO</p>
            <h2 class="productos-title mb-0">MOVIMIENTO DE INVENTARIO</h2>
          </div>
        </div>
      </div>
    </p-card>

  <p-table
    [value]="movimientos()"
    [paginator]="true"
    [rows]="10"
    [loading]="cargando()"
    responsiveLayout="scroll"
    styleClass="p-datatable-striped"
    [rowsPerPageOptions]="[10, 25, 50]"
  >
    <ng-template pTemplate="header">
      <tr>
        <th>Fecha</th>
        <th>Sede</th> 
        <th>Tipo</th>
        <th>Doc. Ref</th>
        <th>Motivo</th>
        <th>Usuario</th>
        <th class="text-center">Acciones</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-mov>
      <tr>
        <td>{{ mov.fechaMovimiento | date: 'dd/MM/yyyy HH:mm' }}</td>
        <td>
          <span class="font-semibold text-blue-600 dark:text-blue-400">{{ mov.sedeNombre }}</span>
        </td>
        <td>
          <p-tag [value]="mov.tipoMovimiento" [severity]="getSeverity(mov.tipoMovimiento)"></p-tag>
        </td>
        <td>{{ mov.documentoReferencia || 'N/A' }}</td>
        <td>{{ mov.motivo }}</td>
        <td>{{ mov.usuario }}</td>
        <td class="text-center">
          <p-button
            icon="pi pi-eye"
            [rounded]="true"
            [text]="true"
            severity="info"
            (onClick)="verDetalles(mov)"
            pTooltip="Ver Detalles"
          ></p-button>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="7" class="text-center p-4">No se encontraron movimientos registrados.</td>
      </tr>
    </ng-template>
  </p-table>
</div>
